name: Build Windows

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows MSIX
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Install MAUI Workloads
      run: |
        dotnet workload install maui --skip-sign-check
        dotnet workload install maui-windows --skip-sign-check
      
    - name: Restore Workloads
      run: dotnet workload restore src/BirthdayReminder.MAUI/BirthdayReminder.MAUI.csproj
      
    - name: Restore NuGet Packages
      run: dotnet restore src/BirthdayReminder.MAUI/BirthdayReminder.MAUI.csproj -r win-x64
      
    - name: Build Windows
      run: |
        dotnet build src/BirthdayReminder.MAUI/BirthdayReminder.MAUI.csproj `
          -c Release `
          -f net10.0-windows10.0.19041.0 `
          -r win-x64 `
          --no-restore
      
    - name: Publish Windows
      run: |
        dotnet publish src/BirthdayReminder.MAUI/BirthdayReminder.MAUI.csproj `
          -c Release `
          -f net10.0-windows10.0.19041.0 `
          -r win-x64 `
          -p:SelfContained=true `
          -p:WindowsAppSDKSelfContained=true `
          -p:PublishSingleFile=false `
          -o ./publish/windows
      
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BirthdayReminder-Windows
        path: ./publish/windows
        retention-days: 30
