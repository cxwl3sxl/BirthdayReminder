name: Build Windows

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows (Skipped - Requires VS)
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Install MAUI Workloads
      run: |
        dotnet workload install maui --skip-sign-check
        dotnet workload install maui-ios --skip-sign-check
      
    - name: Restore Workloads
      run: dotnet workload restore src/BirthdayReminder.MAUI/BirthdayReminder.MAUI.csproj
      
    - name: Restore NuGet Packages
      run: dotnet restore src/BirthdayReminder.MAUI/BirthdayReminder.MAUI.csproj
      
    - name: Build Windows (Skipped)
      run: |
        echo "⚠️ Windows build skipped in CI"
        echo "MAUI Windows projects require Visual Studio with Windows App SDK."
        echo "Please build locally using Visual Studio 2022."
        echo ""
        echo "Android build is available in the 'Build BirthdayReminder' workflow."
        exit 0
      
    - name: Upload Placeholder
      uses: actions/upload-artifact@v4
      with:
        name: BirthdayReminder-Windows-Placeholder
        path: README.md
        retention-days: 1
