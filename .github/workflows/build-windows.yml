name: Build Windows

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Install MAUI Workloads
      run: |
        dotnet workload install maui --skip-sign-check
        dotnet workload install maui-windows --skip-sign-check
      
    - name: Restore Workloads
      run: dotnet workload restore src/BirthdayReminder.MAUI/BirthdayReminder.MAUI.csproj
      
    - name: Restore NuGet Packages
      run: dotnet restore src/BirthdayReminder.MAUI/BirthdayReminder.MAUI.csproj
      
    - name: Build Windows (No Self-Contained)
      run: |
        dotnet build src/BirthdayReminder.MAUI/BirthdayReminder.MAUI.csproj `
          -c Release `
          -f net10.0-windows10.0.19041.0 `
          -p:SelfContained=false `
          -p:WindowsAppSDKSelfContained=false `
          --no-restore
      
    - name: Upload Build Output
      uses: actions/upload-artifact@v4
      with:
        name: BirthdayReminder-Windows-Build
        path: src/BirthdayReminder.MAUI/bin/Release/net10.0-windows10.0.19041.0
        retention-days: 30
