name: PR Check

on:
  pull_request:
    branches: [ main, master ]

jobs:
  pr-build-check:
    runs-on: windows-latest
    name: PR Build Verification
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Install MAUI Workload
      run: dotnet workload install maui --skip-sign-check
      
    - name: Restore
      run: dotnet restore src/BirthdayReminder.MAUI/BirthdayReminder.MAUI.csproj
      
    - name: Build (Windows)
      run: |
        dotnet build src/BirthdayReminder.MAUI/BirthdayReminder.MAUI.csproj `
          -c Release `
          -f net10.0-windows10.0.19041.0 `
          --no-restore
          
    - name: Build (Android)
      run: |
        dotnet build src/BirthdayReminder.MAUI/BirthdayReminder.MAUI.csproj `
          -c Release `
          -f net10.0-android `
          --no-restore
