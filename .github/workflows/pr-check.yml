name: PR Check

on:
  pull_request:
    branches: [ main, master ]

jobs:
  pr-build-check:
    runs-on: windows-latest
    name: PR Build Verification
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Install MAUI Workloads
      run: |
        dotnet workload install maui-android --skip-sign-check
        dotnet workload install maui-ios --skip-sign-check
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'
        
    - name: Restore Workloads
      run: dotnet workload restore src/BirthdayReminder.MAUI/BirthdayReminder.MAUI.csproj
      
    - name: Restore NuGet Packages
      run: dotnet restore src/BirthdayReminder.MAUI/BirthdayReminder.MAUI.csproj
      
    - name: Build (Android)
      run: dotnet build src/BirthdayReminder.MAUI/BirthdayReminder.MAUI.csproj -c Release -f net10.0-android --no-restore
