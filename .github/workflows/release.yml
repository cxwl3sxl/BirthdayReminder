name: Release BirthdayReminder

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如: v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  release-android:
    runs-on: windows-latest
    name: Release Android
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Install MAUI Workloads
      run: |
        dotnet workload install maui-android --skip-sign-check
        dotnet workload install maui-ios --skip-sign-check
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'
        
    - name: Restore Workloads
      run: dotnet workload restore src/BirthdayReminder.MAUI/BirthdayReminder.MAUI.csproj
      
    - name: Restore NuGet Packages
      run: dotnet restore src/BirthdayReminder.MAUI/BirthdayReminder.MAUI.csproj
      
    - name: Publish Android APK
      run: dotnet publish src/BirthdayReminder.MAUI/BirthdayReminder.MAUI.csproj -c Release -f net10.0-android -p:AndroidPackageFormat=apk --self-contained -o ./publish
      
    - name: Rename APK
      shell: pwsh
      run: |
        $apk = Get-ChildItem ./publish/*.apk | Select-Object -First 1
        if ($apk) {
          $newName = "BirthdayReminder-Android.apk"
          Rename-Item $apk.FullName -NewName $newName
          Write-Host "Renamed to: $newName"
        }
          
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: BirthdayReminder-Android-Release
        path: ./publish/BirthdayReminder-Android.apk
        retention-days: 90
